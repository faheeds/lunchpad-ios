<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LunchPad</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --border:   #334155;
      --text:     #f8fafc;
      --muted:    #94a3b8;
      --subtle:   #64748b;
      --accent:   #f59e0b;
      --accent-fg:#0f172a;
      --danger:   #f87171;
      --radius:   14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: max(env(safe-area-inset-top), 24px) 24px
               max(env(safe-area-inset-bottom), 24px);
      gap: 0;
    }

    /* ── Logo ── */
    .logo {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 6px;
    }
    .logo em { color: var(--accent); font-style: normal; }

    .tagline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 44px;
      text-align: center;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 20px;
      font-weight: 600;
      padding: 14px 16px;
      letter-spacing: 0.02em;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: #334155; font-weight: 400; font-size: 16px; }

    .hint {
      font-size: 12px;
      color: var(--subtle);
      margin-top: 8px;
      line-height: 1.5;
    }

    .error {
      display: none;
      font-size: 12px;
      color: var(--danger);
      margin-top: 10px;
      font-weight: 500;
    }

    button.primary {
      width: 100%;
      margin-top: 20px;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    button.primary:active { opacity: 0.8; }
    button.primary:disabled { opacity: 0.5; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--subtle);
      font-size: 11px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Apple Sign-In button ── */
    button.apple {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.1s;
    }
    button.apple:active { opacity: 0.85; }

    /* ── Switch school link ── */
    .switch-school {
      display: none;
      font-size: 12px;
      color: var(--subtle);
      text-align: center;
      margin-top: 16px;
      cursor: pointer;
    }
    .switch-school span { color: var(--accent); }

    /* ── Footer ── */
    .footer {
      margin-top: 40px;
      font-size: 11px;
      color: #334155;
      text-align: center;
    }

    /* ── Loading overlay ── */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 100;
    }
    #loading.visible { display: flex; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 14px; color: var(--muted); }
  </style>
</head>
<body>

  <div class="logo">Lunch<em>Pad</em></div>
  <p class="tagline">School lunch ordering, simplified.</p>

  <div class="card" id="schoolCard">
    <label for="schoolCode">School code</label>
    <input
      id="schoolCode"
      type="text"
      placeholder="e.g. lincolnelementary"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="none"
      spellcheck="false"
      inputmode="url"
    />
    <p class="hint">Your school's unique LunchPad code — ask your school office if unsure.</p>
    <p class="error" id="errorMsg"></p>
    <button class="primary" id="openBtn" onclick="openSchool()">
      Open LunchPad
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>

  <p class="switch-school" id="switchLink" onclick="showSchoolEntry()">
    Wrong school? <span>Switch school</span>
  </p>

  <p class="footer">LunchPad · school lunch made easy</p>

  <!-- Loading overlay shown while navigating to school URL -->
  <div id="loading">
    <div class="spinner"></div>
    <p id="loadingMsg">Opening LunchPad…</p>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
