workflows:
  ios-testflight:
    name: LunchPad iOS — Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - signing        # contains ASC_PRIVATE_KEY_B64, ASC_KEY_ID, ASC_ISSUER_ID

      vars:
        BUNDLE_ID: us.lunchpad.app
        TEAM_ID: GUAH9Y367F
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App

      node: v20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Create iOS project if missing
        script: |
          if [ ! -d "ios" ]; then
            echo "ios/ not found — running npx cap add ios"
            npx cap add ios
          else
            echo "ios/ already present — skipping cap add"
          fi

      - name: Sync Capacitor plugins to iOS
        script: npx cap sync ios

      - name: Inspect Xcode scheme
        script: |
          SCHEME_FILE=$(find ios -name "App.xcscheme" | head -1)
          echo "Scheme file: $SCHEME_FILE"
          cat "$SCHEME_FILE"

      - name: Set development team in Xcode project
        script: |
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' "s/DEVELOPMENT_TEAM = \"\"/DEVELOPMENT_TEAM = $TEAM_ID/g" "$PBXPROJ"
          sed -i '' "s/CODE_SIGN_STYLE = Debug/CODE_SIGN_STYLE = Automatic/g" "$PBXPROJ"
          sed -i '' "s/CODE_SIGN_STYLE = Release/CODE_SIGN_STYLE = Automatic/g" "$PBXPROJ"
          echo "Team ID injected into project.pbxproj"

      - name: Add Sign In with Apple + Push entitlements
        script: |
          ENTITLEMENTS="ios/App/App/App.entitlements"
          if [ ! -f "$ENTITLEMENTS" ]; then
            cat > "$ENTITLEMENTS" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.developer.applesignin</key>
            <array>
              <string>Default</string>
            </array>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          PLIST
            echo "Created App.entitlements"
          else
            echo "App.entitlements already exists"
          fi

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install

      - name: Fetch signing certificates and profiles
        script: |
          # Decode ASC API key (for Apple auth)
          echo "$ASC_PRIVATE_KEY_B64" | base64 --decode > /tmp/asc_key.p8
          echo "ASC key: $(head -1 /tmp/asc_key.p8)"

          # Decode certificate private key (used to create/match the P12)
          echo "$CERT_KEY_B64" | base64 --decode > /tmp/cert_key.pem
          echo "Cert key: $(head -1 /tmp/cert_key.pem)"

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$ASC_ISSUER_ID" \
            --key-id "$ASC_KEY_ID" \
            --private-key "@file:/tmp/asc_key.p8" \
            --certificate-key "@file:/tmp/cert_key.pem" \
            --create

          keychain add-certificates

      - name: Build iOS archive (Release)
        script: |
          set -o pipefail
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/LunchPad.xcarchive" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            clean archive \
            | xcpretty --color

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/LunchPad.xcarchive" \
            -exportPath "$CM_BUILD_DIR/ipa" \
            -exportOptionsPlist /dev/stdin << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>GUAH9Y367F</string>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          EOF

      - name: Upload to TestFlight
        script: |
          IPA=$(find "$CM_BUILD_DIR/ipa" -name "*.ipa" | head -1)
          echo "Uploading $IPA to TestFlight..."
          app-store-connect publish \
            --issuer-id "$ASC_ISSUER_ID" \
            --key-id "$ASC_KEY_ID" \
            --private-key "@file:/tmp/asc_key.p8" \
            --path "$IPA" \
            --testflight \
            --beta-groups "Internal Testers"

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - faheed.subhani@gmail.com
        notify:
          success: true
          failure: true
