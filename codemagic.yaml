workflows:
  ios-testflight:
    name: LunchPad iOS — Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Faheed ASC Key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: us.lunchpad.app

      groups:
        - app_store

      vars:
        BUNDLE_ID: us.lunchpad.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App

      node: v20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Create iOS project if missing
        script: |
          if [ ! -d "ios" ]; then
            echo "ios/ not found — running npx cap add ios"
            npx cap add ios
          else
            echo "ios/ already present — skipping cap add"
          fi

      - name: Sync Capacitor plugins to iOS
        script: npx cap sync ios

      - name: Add Sign In with Apple + Push entitlements
        script: |
          ENTITLEMENTS="ios/App/App/App.entitlements"
          if [ ! -f "$ENTITLEMENTS" ]; then
            cat > "$ENTITLEMENTS" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.developer.applesignin</key>
            <array>
              <string>Default</string>
            </array>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          PLIST
            echo "Created App.entitlements"
          else
            echo "App.entitlements already exists"
          fi

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install

      - name: Build iOS archive (Release)
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/LunchPad.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=YES \
            clean archive \
            | xcpretty --color

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --config Release

      - name: Upload to TestFlight
        script: |
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Uploading $IPA to TestFlight..."
          app-store-connect publish \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --path "$IPA" \
            --testflight \
            --beta-groups "Internal Testers"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
      email:
        recipients:
          - faheed.subhani@gmail.com
        notify:
          success: true
          failure: true
